<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Admin Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Admin Styles -->
    <link rel="stylesheet" href="style/admin.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-brand">
            <h5><i class="fas fa-store"></i> ShopPanel</h5>
        </div>
        <ul class="sidebar-menu">
            <li class="sidebar-section-title">MAIN</li>
            <li>
                <a href="admin.html">
                    <i class="fas fa-chart-line"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li>
                <a href="orders.html">
                    <i class="fas fa-shopping-bag"></i>
                    <span>Orders</span>
                </a>
            </li>
            <li>
                <a href="products.html">
                    <i class="fas fa-boxes"></i>
                    <span>Products</span>
                </a>
            </li>
            <li>
                <a href="customers.html" class="active">
                    <i class="fas fa-users"></i>
                    <span>Customers</span>
                </a>
            </li>

            <li class="sidebar-section-title">STORE</li>
            <li>
                <a href="revenue.html">
                    <i class="fas fa-dollar-sign"></i>
                    <span>Revenue</span>
                </a>
            </li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Topbar -->
        <div class="topbar">
            <h3>Customers Management</h3>
            <a href="account.html" class="d-flex align-items-center gap-2" title="Account" style="text-decoration:none; color:white;">
                <span style="font-size: 1.1rem;">👤</span>
                <span id="admin_name_label" style="color: black;">Admin</span>
            </a>
        </div>

        <!-- Customers Stats -->
        <div class="row">
            <div class="col-lg-3 col-md-6">
                <div class="stat-card">
                    <div class="stat-card-icon customers">
                        <i class="fas fa-users"></i>
                    </div>
                    <h6>Total Customers</h6>
                    <h3 id="totalCustomersCount">0</h3>
                    <p class="stat-card-change"><i class="fas fa-arrow-up"></i> Registered Users</p>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="stat-card">
                    <div class="stat-card-icon">
                        <i class="fas fa-user-check" style="color: #20c997;"></i>
                    </div>
                    <h6>Active Customers</h6>
                    <h3 id="activeCustomersCount">0</h3>
                    <p class="stat-card-change"><i class="fas fa-arrow-up"></i> Currently active</p>
                </div>
            </div>
        </div>

        <!-- Customers Table -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="stat-card">
                    <div class="card-header-custom">
                        <h5>All Customers</h5>
                    </div>
                    <div style="padding: 0; overflow-x: auto;">
                        <table class="table table-custom">
                            <thead>
                                <tr>
                                    <th>CUSTOMER ID</th>
                                    <th>NAME</th>
                                    <th>EMAIL</th>
                                    <th>TOTAL ORDERS</th>
                                    <th>TOTAL SPENT</th>
                                    <th>JOIN DATE</th>
                                    <th>STATUS</th>
                                    <th>ACTION</th>
                                </tr>
                            </thead>
                            <tbody id="customersTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentAdmin = JSON.parse(localStorage.getItem('currentAdmin'));
            const label = document.getElementById('admin_name_label');
            if (currentAdmin && label) {
                label.textContent = currentAdmin.name || currentAdmin.email || 'Admin';
            }
        });
    </script>
    <script src="scripts/users/customers.js"></script>
</body>
</html>
