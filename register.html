<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Store Register</title>
  <link rel="stylesheet" href="style/register.css" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<body>

  <div class="card">
    <div class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="3" y1="6" x2="21" y2="6" stroke="white" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 10a4 4 0 0 1-8 0" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Create an account</h1>
      <p>Sign up to get started</p>
    </div>

    <div class="form">
      <div class="form-row">
        <div class="form-group">
          <label for="firstname">First name</label>
          <input type="text" id="firstname" placeholder="John" />
        </div>
        <div class="form-group">
          <label for="lastname">Last name</label>
          <input type="text" id="lastname" placeholder="Doe" />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" placeholder="••••••••" />
      </div>

      <button id="create-account-button" type="button">Create account</button>
    </div>

    <p class="footer">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
    <script src="scripts/register.js"></script>
</body>
</html>
